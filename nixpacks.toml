[phases.setup]
nixPkgs = ["nodejs_20", "nginx"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npm run build",
  "mkdir -p /usr/share/nginx/html",
  "cp -r dist/* /usr/share/nginx/html/",
  "mkdir -p /etc/nginx",
  "cp nginx.conf /etc/nginx/nginx.conf",
]

[start]
cmd = "nginx -c /etc/nginx/nginx.conf -g 'daemon off;'"
